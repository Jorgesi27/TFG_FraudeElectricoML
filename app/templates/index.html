<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detección de Fraude Eléctrico</title>

    <style>

        body{
            font-family: Arial;
            margin:40px;
            background:#f5f7fb;
        }

        .top{
            display:flex;
            gap:20px;
            margin-bottom:20px;
        }

        select{
            width:300px;
            padding:10px;
        }

        .container{
            display:flex;
            gap:20px;
        }

        .chart-box{
            width:70%;
            height:500px;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        #graficaCurva{
            width:100% !important;
            height:400px !important;
        }

        .result-box{
            width:30%;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        .fraude{
            color:red;
            font-size:40px;
            font-weight:bold;
        }

        button{
            margin-top:20px;
            padding:12px 20px;
            font-size:16px;
        }

    </style>
</head>

<body>

<h1>Detección de Fraude Eléctrico</h1>

<div class="upload-container">

    <input type="file" id="csvFile">

    <button onclick="importarArchivo()">
        Importar archivo
    </button>

</div>

<div class="top">

    <select id="archivoSelect" onchange="cargarCurvas()">
        <option>Seleccionar archivo</option>
    </select>

    <select id="curvaSelect" onchange="mostrarGrafica()">
        <option>Seleccionar curva</option>
    </select>

</div>

<div class="container">

    <div class="chart-box">
        <canvas id="graficaCurva"></canvas>

        <button onclick="prediccionHistorica()">
            Predicción histórica
        </button>

        <button onclick="prediccionTiempoReal()">
            Predicción tiempo real
        </button>
    </div>

    <div class="result-box">

        <h2>Resultado</h2>

        <div id="resultado" class="fraude">
            ---
        </div>

        <h3 id="probabilidad">
            ---
        </h3>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/js/app.js"></script>

</body>
</html>
